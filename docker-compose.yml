# ─────────────────────────────────────────────────────────
# NEU-Pay – Docker Compose (Local Development)
# Usage:  docker compose up -d
# ─────────────────────────────────────────────────────────

services:
  # ── MySQL Database ──
  mysql:
    image: mysql:8.4
    container_name: neupay-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-neupay}
      MYSQL_USER: ${DB_USERNAME:-neupay}
      MYSQL_PASSWORD: ${DB_PASSWORD:-neupay}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak (Local OIDC Provider) ──
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: neupay-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloak
      KC_DB_USERNAME: ${DB_USERNAME:-neupay}
      KC_DB_PASSWORD: ${DB_PASSWORD:-neupay}
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8180
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8180:8180"
    depends_on:
      mysql:
        condition: service_healthy

  # ── Spring Boot Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neupay-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-neupay}
      DB_USERNAME: ${DB_USERNAME:-neupay}
      DB_PASSWORD: ${DB_PASSWORD:-neupay}
      OAUTH2_ISSUER_URI: http://keycloak:8180/realms/neupay
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  # ── Flutter Web (Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neupay-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local
